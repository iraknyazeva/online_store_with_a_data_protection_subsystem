{% extends "base.html" %}

{% block title %}Подтверждение регистрации{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="card shadow-sm border-0" style="border-radius: 20px;">
                <div class="card-body p-5">

                    <h2 class="text-center mb-4 fw-bold" style="color: #9B2C2C;">
                        Подтверждение регистрации
                    </h2>

                    <p class="text-center text-muted mb-4">
                        Код подтверждения отправлен на вашу почту.<br>
                        Пожалуйста, введите его ниже:
                    </p>

                    <form method="POST">
                        <div class="mb-4">
                            <label for="code" class="form-label fw-semibold text-center d-block mb-2">
                                Код подтверждения
                            </label>
                            <input type="text" 
                                   class="form-control form-control-lg text-center fs-3" 
                                   id="code" 
                                   name="code" 
                                   required 
                                   pattern="[0-9]{6}"
                                   maxlength="6"
                                   placeholder="000000"
                                   style="letter-spacing: 8px;">
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" 
                                    class="btn btn-lg"
                                    style="background-color: #228B22; 
                                           color: white; 
                                           border: none; 
                                           font-weight: 500;">
                                Подтвердить регистрацию
                            </button>
                            
                            <a href="{{ url_for('auth.register') }}" 
                               class="btn btn-outline-secondary btn-lg">
                                Отправить код заново
                            </a>
                        </div>
                    </form>

                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// Автоматическая отправка после ввода 6 цифр
document.getElementById('code').addEventListener('input', function() {
    if (this.value.length === 6) {
        this.form.submit();
    }
});
</script>
{% endblock %}
